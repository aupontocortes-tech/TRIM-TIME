    <circle cx="30" cy="55" r="12" stroke="#d4a853" stroke-width="6" fill="#0a0a0a"/>
    <!-- Anel direito -->
    <circle cx="90" cy="55" r="12" stroke="#d4a853" stroke-width="6" fill="#0a0a0a"/>
